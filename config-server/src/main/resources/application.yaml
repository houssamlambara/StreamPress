server:
  port: 8888

spring:
  application:
    name: config-server
  profiles:
    active: git
  cloud:
    config:
      server:
        git:
          uri: https://github.com/houssamlambara/StreamPress-config
          default-label: main

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
